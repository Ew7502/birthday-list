<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Birthday Wishlist</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; background-color: #f4f7f6; color: #333; }
        h1 { text-align: center; color: #2d3436; margin-bottom: 2rem; }
        #gift-list { display: flex; flex-direction: column; gap: 15px; }
        .gift-item { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border: 1px solid #e0e0e0; }
        .details { flex-grow: 1; margin-right: 15px; }
        .name { font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 5px; color: #2d3436; }
        .price { color: #27ae60; font-weight: 800; font-size: 1rem; }
        .link { display: inline-block; margin-top: 8px; font-size: 0.85rem; color: #0984e3; text-decoration: none; font-weight: 500; }
        button { background: #00b894; color: white; border: none; padding: 0.7rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #009677; }
        .error-msg { background: #ffeaa7; padding: 1rem; border-radius: 8px; border: 1px solid #fdcb6e; color: #d35400; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>🎂 Elise's Birthday List !!!</h1>
    <div id="stats-box" style="text-align: center; background: #e8f5e9; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c8e6c9; color: #2e7d32; font-weight: bold;">
        Loading stats...
    </div>

    <div id="gift-list">Loading your wishlist...</div>

    <script>
</div>

    <script>
        // 1. Connection Info
        const SUPABASE_URL = 'https://svhwpscnnxqwmzhmcqda.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jTRYYEXlB-0h1SbUwvIejg_sRuM7Fsa';

        // 2. Initialize
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchGifts() {
            // We removed the .eq filter temporarily to see if ANY data comes back
            const { data, error } = await _supabase
                .from('gifts')
                .select('*');

            if (error) {
                console.error(error);
                document.getElementById('gift-list').innerHTML = `
                    <div class="error-msg">
                        <strong>Connection Error:</strong><br>
                        ${error.message}<br><br>
                        <em>Tip: Make sure RLS is disabled or has a 'Select' policy!</em>
                    </div>`;
            } else {
                displayGifts(data);
            }
        }

        function displayGifts(gifts) {
            const listDiv = document.getElementById('gift-list');
            const statsDiv = document.getElementById('stats-box'); // This finds your new box
            
            // 1. Calculate the numbers
            const total = gifts.length;
            const boughtCount = gifts.filter(g => g.bought === true).length;
            
            // 2. Update the "Bow" box at the top
            statsDiv.innerHTML = `🎁 ${boughtCount} / ${total} Gifts Claimed`;

            // 3. Filter the list to show only items NOT bought
            const availableGifts = gifts.filter(item => item.bought === false || item.bought === null);

            if (availableGifts.length === 0 && total > 0) {
                listDiv.innerHTML = "<p style='text-align:center; font-size: 1.2rem;'>All items have been claimed! 🎉</p>";
                return;
            }

            // 4. Draw the remaining items
            listDiv.innerHTML = availableGifts.map(item => `
                <div class="gift-item">
                    <div class="details">
                        <span class="name">${item.name}</span>
                        <span class="price">£${item.price || '0.00'}</span><br>
                        <a href="${item.url}" target="_blank" class="link">View Online ↗</a>
                    </div>
                    <button onclick="claimGift(${item.id}, '${item.name.replace(/'/g, "\\'")}')">I bought this</button>
                </div>
            `).join('');
        }
            }

            // Filter out items where bought is true (done in JS for safety)
            const availableGifts = gifts.filter(g => g.bought === false || g.bought === null);

            if (availableGifts.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center;'>All items claimed! 🎉</p>";
                return;
            }

            listDiv.innerHTML = availableGifts.map(item => `
                <div class="gift-item">
                    <div class="details">
                        <span class="name">${item.name}</span>
                        <span class="price">£${item.price || '0.00'}</span><br>
                        <a href="${item.url}" target="_blank" class="link">View Online ↗</a>
                    </div>
                    <button onclick="claimGift(${item.id}, '${item.name.replace(/'/g, "\\'")}')">I bought this</button>
                </div>
            `).join('');
        }

        async function claimGift(id, name) {
            if (confirm(`Mark "${name}" as bought?`)) {
                const { error } = await _supabase
                    .from('gifts')
                    .update({ bought: true })
                    .eq('id', id);

                if (error) {
                    alert("Error updating: " + error.message);
                } else {
                    fetchGifts();
                }
            }
        }

        fetchGifts();
    </script>
</body>
</html>

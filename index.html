<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Birthday Wishlist</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    /* 1. The "Base" - settings for all devices */
    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        max-width: 600px; /* Slightly wider for tablets */
        margin: 0 auto; 
        padding: 1rem; 
        background-color: #f4f7f6; 
        color: #333;
        line-height: 1.5;
    }

    h1 { 
        text-align: center; 
        color: #2d3436; 
        margin: 1.5rem 0;
        font-size: 1.8rem;
    }

    #gift-list { 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
    }

    /* 2. The Card - adjusted for fingers to tap easily */
    .gift-item { 
        background: white; 
        padding: 1rem; 
        border-radius: 12px; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border: 1px solid #e0e0e0;
    }

    .details { 
        flex-grow: 1; 
        padding-right: 10px; 
    }

    .name { 
        font-weight: 700; 
        font-size: 1.05rem; 
        display: block; 
        color: #2d3436; 
    }

    .price { 
        color: #27ae60; 
        font-weight: 800; 
    }

    .link { 
        display: inline-block; 
        margin-top: 5px; 
        font-size: 0.8rem; 
        color: #0984e3; 
        text-decoration: none; 
    }

    /* 3. The Button - made bigger for mobile "thumbs" */
    button { 
        background: #00b894; 
        color: white; 
        border: none; 
        padding: 12px 16px; /* Bigger "tap target" */
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold;
        white-space: nowrap; /* Keeps text on one line */
        font-size: 0.9rem;
        transition: transform 0.1s;
    }

    button:active {
        transform: scale(0.95); /* Little "click" feel on phones */
    }

    /* 4. "Media Query" - Special rule for tiny phones */
    @media (max-width: 400px) {
        .gift-item {
            flex-direction: column; /* Stack details and button vertically */
            align-items: flex-start;
            gap: 12px;
        }
        button {
            width: 100%; /* Make button full width on tiny phones */
        }
    }
</style>
</head>
<body>

    <h1>🎂 My Birthday List</h1>
    <div id="gift-list">Loading your wishlist...</div>

    <script>
        // 1. Connection Info
        const SUPABASE_URL = 'https://svhwpscnnxqwmzhmcqda.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jTRYYEXlB-0h1SbUwvIejg_sRuM7Fsa';

        // 2. Initialize
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchGifts() {
            // We removed the .eq filter temporarily to see if ANY data comes back
            const { data, error } = await _supabase
                .from('gifts')
                .select('*');

            if (error) {
                console.error(error);
                document.getElementById('gift-list').innerHTML = `
                    <div class="error-msg">
                        <strong>Connection Error:</strong><br>
                        ${error.message}<br><br>
                        <em>Tip: Make sure RLS is disabled or has a 'Select' policy!</em>
                    </div>`;
            } else {
                displayGifts(data);
            }
        }

        function displayGifts(gifts) {
            const listDiv = document.getElementById('gift-list');
            
            // If the database is empty or blocked by RLS
            if (!gifts || gifts.length === 0) {
                listDiv.innerHTML = `
                    <div class="error-msg">
                        <strong>No items found.</strong><br>
                        If you have items in Supabase, your "Policies" (RLS) might be blocking the website from seeing them.
                    </div>`;
                return;
            }

            // Filter out items where bought is true (done in JS for safety)
            const availableGifts = gifts.filter(g => g.bought === false || g.bought === null);

            if (availableGifts.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center;'>All items claimed! 🎉</p>";
                return;
            }

            listDiv.innerHTML = availableGifts.map(item => `
                <div class="gift-item">
                    <div class="details">
                        <span class="name">${item.name}</span>
                        <span class="price">£${item.price || '0.00'}</span><br>
                        <a href="${item.url}" target="_blank" class="link">View Online ↗</a>
                    </div>
                    <button onclick="claimGift(${item.id}, '${item.name.replace(/'/g, "\\'")}')">I bought this</button>
                </div>
            `).join('');
        }

        async function claimGift(id, name) {
            if (confirm(`Mark "${name}" as bought?`)) {
                const { error } = await _supabase
                    .from('gifts')
                    .update({ bought: true })
                    .eq('id', id);

                if (error) {
                    alert("Error updating: " + error.message);
                } else {
                    fetchGifts();
                }
            }
        }

        fetchGifts();
    </script>
</body>
</html>
